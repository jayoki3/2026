<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine? 💕</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff9e6 0%, #ffe6f0 50%, #fff4e6 100%);
        }

        .page {
            display: none;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .page.active {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .question-page {
            text-align: center;
        }

        .cute-image {
            width: 200px;
            height: 200px;
            margin-bottom: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 230, 179, 0.5);
        }

        h1 {
            font-size: 2.5em;
            color: #ffb3d9;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(255, 179, 217, 0.3);
            font-weight: 700;
        }

        .flowers {
            font-size: 3em;
            margin: 20px 0;
            animation: sway 2s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        .button-container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            align-items: center;
            justify-content: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #yesBtn {
            background: linear-gradient(135deg, #ffb3d9 0%, #ffe6b3 100%);
            color: white;
            font-weight: 700;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255, 179, 217, 0.6);
        }

        #noBtn {
            background: linear-gradient(135deg, #ddd 0%, #bbb 100%);
            color: #666;
        }

        #noBtn:hover {
            background: linear-gradient(135deg, #ccc 0%, #aaa 100%);
        }

        /* Success Page */
        .success-page {
            text-align: center;
        }

        .success-page h1 {
            font-size: 3em;
            color: #ffb3d9;
            margin-bottom: 30px;
            animation: bounce 1s ease infinite;
            font-weight: 700;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .date-info {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 230, 179, 0.4);
            margin-top: 30px;
        }

        .date-info h2 {
            color: #ffb3d9;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .date-info p {
            font-size: 1.2em;
            color: #666;
            line-height: 1.6;
        }

        .couple-images {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .couple-image {
            width: 150px;
            height: 150px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(255, 230, 179, 0.4);
            object-fit: cover;
        }
        .image-with-caption {
            text-align: center;
        }

        .caption {
            margin-top: 10px;
         font-size: 0.9em;
         color: #ffb3d9;
         font-weight: 600;
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffb3d9;
            position: absolute;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .heart {
            color: #ffb3d9;
            font-size: 2em;
        }

        /* Instruction comment for easy customization */
        .edit-note {
            background: #fff9e6;
            border-left: 4px solid #ffcc00;
            padding: 15px;
            margin: 20px 0;
            border-radius: 5px;
            text-align: left;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Question Page -->
    <div class="page active question-page" id="questionPage">
        <!-- 
            TO CUSTOMIZE: Replace the src below with your cute image URL
            Example: <img src="your-image.jpg" class="cute-image" alt="Cute image">
        -->
        <img src="dog-pic.jpg" class="cute-image" alt="Cute image">
        
        <div class="flowers">🌹 🌸 🌺 🌻 🌷</div>
        
        <h1>Will you be my Valentine?</h1>
        
        <div class="button-container">
            <button id="yesBtn">Yes! 💕</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <!-- Success Page -->
    <div class="page success-page" id="successPage">
        <h1> 💕🎉HEHE YAYY! 🎉💕</h1>
        
        <div class="flowers">🌹 💖 🌹 💖 🌹</div>
        
        <!-- 
            TO CUSTOMIZE: Add your couple photos here
            Replace the src with your actual image files
            You can add more images by copying the img tag
        -->
        <div class="couple-images">
    <div class="image-with-caption">
        <img src="kay-pic.jpeg" class="couple-image" alt="2023">
        <p class="caption">2023 💕</p>
    </div>
    <div class="image-with-caption">
        <img src="steak-pic.jpeg" class="couple-image" alt="2024">
        <p class="caption">2024 ❤️</p>
    </div>
    <div class="image-with-caption">
        <img src="flower-pic.jpeg" class="couple-image" alt="2025">
        <p class="caption">2025 💖 </p>
    </div>
</div>
        <div class="date-info">
            <h2>Our Date! 💕</h2>
            <!-- 
                TO CUSTOMIZE: Edit the date details below
            -->
            <p><strong>When:</strong> February 14th, 2026 at 12:00 PM</p>
            <p><strong>Where:</strong> facetime -_- </p>
            <p style="margin-top: 20px;">
              ❤️ I can't wait to spend the day with you honey! ❤️
            </p>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionPage = document.getElementById('questionPage');
        const successPage = document.getElementById('successPage');

        // Array of messages for the No button
        const noMessages = [
            'No',
            'wot? 🥺',
            'really? 😢',
            'soooo you hate me. 💔',
            'Please? 🥹',
            'u stink.',
            'Ogay :( 😞'
        ];

        let noClickCount = 0;
        let yesBtnScale = 1;

        // No button click handler
        noBtn.addEventListener('click', () => {
            noClickCount++;
            
            // Change the No button text
            if (noClickCount < noMessages.length) {
                noBtn.textContent = noMessages[noClickCount];
            }
            
            // Make Yes button bigger
            yesBtnScale += 0.3;
            yesBtn.style.transform = `scale(${yesBtnScale})`;
            
            // Shake the No button
            noBtn.style.animation = 'shake 0.5s';
            setTimeout(() => {
                noBtn.style.animation = '';
            }, 500);
        });

        // Yes button click handler
        yesBtn.addEventListener('click', () => {
            questionPage.classList.remove('active');
            successPage.classList.add('active');
            createConfetti();
        });

        // Create confetti effect
        function createConfetti() {
            const colors = ['#ffb3d9', '#ffe6b3', '#ffc4e1', '#fff4d6', '#ffcce5'];
            const confettiCount = 100;

            for (let i = 0; i < confettiCount; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 3 + 's';
                    confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 5000);
                }, i * 30);
            }
        }

        // Shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
